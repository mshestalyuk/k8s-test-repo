#cloud-config
packages:
  - curl
users:
  - default
  - name: cluster
    ssh-authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILaLhAhih/YtH9I1F7LZ2rfO5RcMLXHLPqDoKFdjngZ9 mshestalyuk@MaksPC
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICF08vhUaTW+8E7/t2gtc+4n1FEKV8UBga+F7pMaK7rQ mshestalyuk@MaksPC
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash

runcmd:
  - apt-get update -y
  - apt-get install -y curl
  # Detect IPs - private network has been attached by the time cloud-init runs
  - PRIVATE_IP=$(ip -4 -o addr show | awk '$4 ~ /^10\.0\./ {print $4}' | cut -d/ -f1 | head -1)
  - PUBLIC_IP=$(curl -s -4 ifconfig.me)
  - |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.28.5+k3s1 INSTALL_K3S_EXEC="\
      --disable traefik \
      --disable-cloud-controller \
      --kubelet-arg cloud-provider=external \
      --node-ip ${PRIVATE_IP} \
      --node-external-ip ${PUBLIC_IP} \
      --tls-san ${PUBLIC_IP} \
      --tls-san ${PRIVATE_IP}" sh -
  - chown cluster:cluster /etc/rancher/k3s/k3s.yaml
  - chown cluster:cluster /var/lib/rancher/k3s/server/node-token
  # Install helm on the master so you can run `helm` directly there
  - curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  # Make kubeconfig usable for the cluster user without sudo
  - mkdir -p /home/cluster/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/cluster/.kube/config
  - chown -R cluster:cluster /home/cluster/.kube
  - chmod 600 /home/cluster/.kube/config
  - echo 'export KUBECONFIG=$HOME/.kube/config' >> /home/cluster/.bashrc