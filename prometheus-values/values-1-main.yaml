rbac:
  create: true

podSecurityPolicy:
  enabled: false

serviceAccounts:
  server:
    create: true

server:
  name: server

  # Ingress disabled for now — you don't have nginx-ingress or cert-manager.
  # We'll access via port-forward or NodePort instead.
  ingress:
    enabled: false

  image:
    repository: quay.io/prometheus/prometheus
    pullPolicy: IfNotPresent

  global:
    scrape_interval: 30s
    scrape_timeout: 10s
    evaluation_interval: 1m

  strategy:
    type: Recreate

  # k3s ships with local-path-provisioner; PVCs work out of the box.
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteOnce
    mountPath: /data
    size: 10Gi          # cax11 nodes are small; 50Gi is overkill for a lab
    storageClass: local-path

  # cax11 has 4GB RAM total. 4Gi just for prometheus is too much.
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

  service:
    enabled: true
    type: ClusterIP   # change to NodePort if you want easy external access

networkPolicy:
  enabled: false

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheus-pushgateway:
  enabled: false   # disable to save resources unless you specifically need it

configmapReload:
  prometheus:
    enabled: true   # actually useful — reloads prometheus on config change

alertmanager:
  enabled: false   # save resources for the lab; enable later if you want alerts