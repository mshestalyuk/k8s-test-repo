apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  project: observability
  sources:
  - repoURL: 'https://prometheus-community.github.io/helm-charts'
    targetRevision: 25.27.0
    chart: prometheus
    helm:
      valueFiles:
      - $values/prometheus-values/values-1-main.yaml
      - $values/prometheus-values/values-3-prometheus-config.yaml
  - repoURL: 'git@github.com:mshestalyuk/k8s-test-repo.git'
    targetRevision: 'master'
    ref: values
    